<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #1e1e1e; overflow: hidden; }
  #terminal { height: 100%; width: 100%; }
</style>
<link rel="stylesheet" href="xterm/xterm.css">
</head>
<body>
<div id="terminal"></div>
<script src="xterm/xterm.js"></script>
<script src="xterm/addon-fit.js"></script>
<script>
  const term = new Terminal({
    theme: {
      background: '#1e1e1e',
      foreground: '#d4d4d4',
      cursor: '#d4d4d4',
      selectionBackground: '#264f78',
    },
    fontFamily: 'Menlo, monospace',
    fontSize: 14,
    scrollback: 10000,
    cursorBlink: true,
    allowProposedApi: true,
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();
  reportSize();

  window.addEventListener('resize', () => {
    fitAddon.fit();
    reportSize();
  });

  function reportSize() {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.terminalSize) {
      window.webkit.messageHandlers.terminalSize.postMessage({
        cols: term.cols,
        rows: term.rows
      });
    }
  }

  term.onData(data => {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.terminalInput) {
      window.webkit.messageHandlers.terminalInput.postMessage(data);
    }
  });

  function writeToTerminal(data) {
    term.write(data);
  }

  function fitTerminal() {
    fitAddon.fit();
    reportSize();
  }

  function getSelectedText() {
    return term.getSelection();
  }

  function selectAll() {
    term.selectAll();
  }

  function clearSelection() {
    term.clearSelection();
  }

  function isChromeLine(text) {
    const t = text.trim();
    if (t.length === 0) return true;
    // Prompt-only lines (❯, $, %, #) with optional whitespace
    if (/^[❯\$%#>]\s*$/.test(t)) return true;
    // Status bar dividers (─── session-name ───)
    if (/^[─━─\-─]{3,}/.test(t)) return true;
    // "Worked for Xs" timer lines
    if (/^[✻⏺◇⎿]?\s*(Worked|Working)\s+for\b/.test(t)) return true;
    return false;
  }

  function getRecentLines(count) {
    const buffer = term.buffer.active;
    const cursorRow = buffer.baseY + buffer.cursorY;
    // Walk up from cursor, skipping empty lines and terminal chrome
    let lastRow = cursorRow;
    while (lastRow > 0) {
      const line = buffer.getLine(lastRow);
      if (line && !isChromeLine(line.translateToString(true))) break;
      lastRow--;
    }
    const startRow = Math.max(0, lastRow - count + 1);
    const lines = [];
    for (let i = startRow; i <= lastRow; i++) {
      const line = buffer.getLine(i);
      if (line) {
        lines.push(line.translateToString(true));
      }
    }
    return lines.join('\n');
  }

  // --- Touch-based selection for iOS ---
  let selectMode = false;

  function setSelectMode(enabled) {
    selectMode = enabled;
    const el = document.querySelector('.xterm-screen');
    if (el) {
      el.style.touchAction = enabled ? 'none' : '';
    }
    if (!enabled) {
      term.clearSelection();
    }
  }

  function getSelectMode() {
    return selectMode;
  }

  // Translate touch coordinates to terminal buffer position
  function touchToMouseEvent(type, touch) {
    const el = document.querySelector('.xterm-screen');
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const mouseEvt = new MouseEvent(type, {
      clientX: touch.clientX,
      clientY: touch.clientY,
      button: 0,
      bubbles: true,
      cancelable: true,
    });
    el.dispatchEvent(mouseEvt);
  }

  const termEl = document.getElementById('terminal');

  termEl.addEventListener('touchstart', (e) => {
    if (!selectMode) return;
    e.preventDefault();
    e.stopPropagation();
    if (e.touches.length === 1) {
      touchToMouseEvent('mousedown', e.touches[0]);
    }
  }, { passive: false, capture: true });

  termEl.addEventListener('touchmove', (e) => {
    if (!selectMode) return;
    e.preventDefault();
    e.stopPropagation();
    if (e.touches.length === 1) {
      touchToMouseEvent('mousemove', e.touches[0]);
    }
  }, { passive: false, capture: true });

  termEl.addEventListener('touchend', (e) => {
    if (!selectMode) return;
    e.preventDefault();
    e.stopPropagation();
    if (e.changedTouches.length === 1) {
      touchToMouseEvent('mouseup', e.changedTouches[0]);
    }
  }, { passive: false, capture: true });

  // Notify Swift when selection changes so the copy button can update
  term.onSelectionChange(() => {
    const text = term.getSelection();
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.terminalSelection) {
      window.webkit.messageHandlers.terminalSelection.postMessage(text || '');
    }
  });

  // Signal to Swift that xterm.js is ready
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.terminalReady) {
    window.webkit.messageHandlers.terminalReady.postMessage('ready');
  }
</script>
</body>
</html>
